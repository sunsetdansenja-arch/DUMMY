<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FFI - Analytic & QC</title>
    <link rel="icon" type="image/png" href="./LOGO FFI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        appbg: '#000000', 
                        appcard: '#1C1C1E', 
                        appapplered: '#FF3B30', 
                        appappleblue: '#ADD8E6', 
                        appappleorange: '#FF9500', 
                        appgreen: '#34C759', 
                        appred: '#FF3B30' 
                    }, 
                    borderRadius: { '4xl': '2rem' },
                    fontFamily: { 'apple': ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'] } 
                } 
            } 
        }
    </script>
    <style>
        body { background-color: #000000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 0px; height: 0px; background: transparent; }
        .hidden-tab { display: none !important; }
        .btn-tactile { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.97); }
        .skeleton-box { position: relative; overflow: hidden; background-color: #1C1C1E; }
        .skeleton-box::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="flex justify-center antialiased bg-[#000000]">

    <!-- MAIN CONTAINER (Dioptimalkan penuh dari max-w-md menjadi max-w-5xl untuk view Desktop Desktop) -->
    <div class="w-full max-w-md md:max-w-5xl bg-appbg min-h-screen relative flex flex-col mx-auto md:border-x border-white/5 pb-20">
        
        <!-- NAVBAR STICKY -->
        <div class="px-6 py-5 md:px-8 sticky top-0 bg-[#000000]/92 backdrop-blur-xl z-20 flex justify-between items-center border-b border-white/5">
            <button onclick="window.location.href='index.html'" class="text-gray-400 hover:text-white transition-transform active:scale-95 text-xs flex items-center gap-2 font-extrabold tracking-widest">
                <i class="fa-solid fa-chevron-left"></i> LOBBY
            </button>
            <h2 class="text-sm md:text-base font-black text-appappleblue tracking-widest uppercase">Analytic & QC</h2>
            <button onclick="loadAnalytics()" class="text-white hover:text-appappleblue transition-transform active:scale-90 text-lg">
                <i class="fa-solid fa-rotate-right" id="sync-icon"></i>
            </button>
        </div>

        <!-- DASHBOARD BODY WRAPPER -->
        <div class="p-6 md:p-8 space-y-6 animate-fade">
            
            <!-- MASTER GRID SYSTEM (Transformasi ke 12-Column Layout asimetris saat desktop) -->
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
                
                <!-- Kiri Utama (Desktop: memakan 7 column untuk Summary & Traceability) -->
                <div class="md:col-span-7 space-y-6">
                    
                    <!-- Summary Stats Card Row -->
                    <div class="flex gap-4">
                        <div class="flex-1 bg-appcard border border-white/7 p-6 rounded-4xl flex flex-col justify-between">
                            <p class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Total SKU</p>
                            <p id="stat-sku" class="text-4xl font-black text-white mt-2">0</p>
                        </div>
                        <div class="flex-1 bg-appcard border border-white/7 p-6 rounded-4xl flex flex-col justify-between">
                            <p class="text-[10px] uppercase font-bold text-gray-500 tracking-widest text-appappleblue">DC Terpantau</p>
                            <p id="stat-dc" class="text-4xl font-black text-white mt-2">0</p>
                        </div>
                    </div>

                    <!-- TRACEABILITY & AGE TRACKING -->
                    <div class="space-y-4">
                        <div class="bg-appappleorange/10 px-5 py-4 rounded-3xl border border-appappleorange/20">
                            <h4 class="text-xs font-black text-appappleorange uppercase tracking-widest"><i class="fa-solid fa-radar mr-2"></i> TRACEABILITY BATCH</h4>
                            <p class="text-[9px] md:text-[10px] text-gray-400 mt-1 font-bold">Pantau sisa umur kadaluarsa seluruh batch di lapangan.</p>
                        </div>
                        
                        <!-- AKORDEON TABS -->
                        <div class="grid grid-cols-2 gap-4">
                            <button type="button" onclick="toggleBatchGroup('crit')" class="bg-[#1A0505] border border-appred/30 p-5 rounded-4xl text-center shadow-[0_0_15px_rgba(255,59,48,0.15)] btn-tactile group relative overflow-hidden">
                                <div class="absolute inset-0 bg-appred/5 group-hover:bg-appred/10 transition-colors"></div>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1 relative z-10">Critical (<= 3 Bln)</p>
                                <div class="flex items-center justify-center gap-2 relative z-10">
                                    <p id="stat-grade-crit" class="text-3xl font-black text-appred ticker">0</p>
                                    <i class="fa-solid fa-chevron-up text-appred text-[10px] transition-transform" id="icon-crit"></i>
                                </div>
                                <p class="text-[7px] text-appred uppercase tracking-widest mt-1.5 font-bold relative z-10 opacity-70">Ketuk Untuk Lihat</p>
                            </button>

                            <button type="button" onclick="toggleBatchGroup('safe')" class="bg-[#051A0A] border border-appgreen/30 p-5 rounded-4xl text-center shadow-[0_0_15px_rgba(52,199,89,0.05)] btn-tactile group relative overflow-hidden">
                                <div class="absolute inset-0 bg-appgreen/5 group-hover:bg-appgreen/10 transition-colors"></div>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1 relative z-10">Safe (> 3 Bln)</p>
                                <div class="flex items-center justify-center gap-2 relative z-10">
                                    <p id="stat-grade-safe" class="text-3xl font-black text-appgreen ticker">0</p>
                                    <i class="fa-solid fa-chevron-down text-appgreen text-[10px] transition-transform" id="icon-safe"></i>
                                </div>
                                <p class="text-[7px] text-appgreen uppercase tracking-widest mt-1.5 font-bold relative z-10 opacity-70">Ketuk Untuk Lihat</p>
                            </button>
                        </div>

                        <!-- DAFTAR BATCH RENDER LAYER -->
                        <div id="group-crit" class="space-y-4 pt-1"></div>
                        <div id="group-safe" class="space-y-4 pt-1 hidden-tab"></div>
                    </div>
                </div>

                <!-- Kanan Utama (Desktop: memakan 5 column untuk Inventory Health & DC Diagnoses) -->
                <div class="md:col-span-5 space-y-6">
                    
                    <!-- INVENTORY HEALTH -->
                    <div class="bg-appcard rounded-4xl border border-appappleblue/25 overflow-hidden">
                        <div class="bg-appappleblue/10 px-5 py-4 border-b border-appappleblue/15">
                            <h4 class="text-xs font-black text-appappleblue uppercase tracking-widest">📦 INVENTORY HEALTH</h4>
                        </div>
                        <div class="p-2 overflow-x-auto">
                            <div class="min-w-[340px] md:min-w-0">
                                <div class="grid grid-cols-5 gap-1.5 px-4 py-3 text-[9px] text-gray-500 font-extrabold uppercase tracking-widest border-b border-white/5 text-center">
                                    <div class="text-left">NAMA SKU</div>
                                    <div>AVG 3M</div>
                                    <div id="th-forecast" class="text-appappleblue italic">FCST</div>
                                    <div id="th-buffer" class="text-appapplered italic">BUFF</div>
                                    <div>STUS</div>
                                </div>
                                <div id="forecast-container" class="px-3 pb-3"></div>
                            </div>
                        </div>
                    </div>

                    <!-- DC DIAGNOSE MODULE -->
                    <div class="space-y-4 pt-2">
                        <h4 class="text-xs font-black text-appappleblue uppercase tracking-[0.2em] px-2">DC Diagnose Results</h4>
                        <div id="diagnosa-container" class="grid grid-cols-1 gap-4"></div>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        document.addEventListener('DOMContentLoaded', () => {
            if(!localStorage.getItem('ffi_user')) { window.location.href = 'index.html'; return; }
            updateMonthHeaders(); setTimeout(() => { loadAnalytics(); }, 100);
        });

        function updateMonthHeaders() {
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"]; const d = new Date();
            document.getElementById('th-buffer').innerHTML = `BUFFER<br>(${months[d.getMonth()]})`; 
            document.getElementById('th-forecast').innerHTML = `FORECAST<br>(${months[(d.getMonth() + 1) % 12]})`;
        }

        function getSkel(count, isList=false) { return Array(count).fill(isList ? `<div class="skeleton-box rounded-4xl h-24 w-full mb-3"></div>` : `<div class="skeleton-box rounded-xl h-10 w-full mb-1.5"></div>`).join(''); }

        function toggleBatchGroup(type) {
            const grp = document.getElementById('group-' + type);
            const icon = document.getElementById('icon-' + type);
            if(grp.classList.contains('hidden-tab')) {
                grp.classList.remove('hidden-tab'); icon.classList.remove('fa-chevron-down'); icon.classList.add('fa-chevron-up');
            } else {
                grp.classList.add('hidden-tab'); icon.classList.remove('fa-chevron-up'); icon.classList.add('fa-chevron-down');
            }
        }

        async function loadAnalytics() {
            const icn = document.getElementById('sync-icon'); icn.classList.add('fa-spin');
            const fCont = document.getElementById('forecast-container'); const dCont = document.getElementById('diagnosa-container'); 
            const contCrit = document.getElementById('group-crit'); const contSafe = document.getElementById('group-safe');
            
            fCont.innerHTML = getSkel(5); dCont.innerHTML = getSkel(3, true); 
            contCrit.innerHTML = getSkel(2, true); contSafe.innerHTML = getSkel(2, true);
            
            try {
                const [reqBuffer, reqDiag, reqStock, reqLog] = await Promise.allSettled([ 
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_buffer" }) }), 
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_diagnose" }) }),
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "get_db_stock" }) }),
                    fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: "load_admin" }) })
                ]);
                
                // 1. Forecast Buffer
                fCont.innerHTML = ''; let skuCount = 0;
                if(reqBuffer.status === 'fulfilled') {
                    let r = await reqBuffer.value.json(); let d = Array.isArray(r) ? r[0].data || r : r.data;
                    (Array.isArray(d) ? d : [d]).forEach((item, idx) => {
                        const row = item.json || item; const vals = Object.values(row); let sku = row.col_2 || vals[1];
                        if(!sku || String(sku).includes("NAMA SKU") || String(sku).includes("col_")) return;
                        const st = String(row.col_6 || vals[5] || ""); skuCount++;
                        const dot = st.includes("CRITICAL") ? '<span class="h-2.5 w-2.5 rounded-full bg-appred animate-pulse"></span>' : '<span class="h-2.5 w-2.5 rounded-full bg-appgreen"></span>';
                        fCont.innerHTML += `<div class="grid grid-cols-5 gap-1.5 items-center py-3 border-b border-white/5 text-[10px] text-center animate-fade" style="animation-delay:${idx*30}ms;opacity:0"><div class="font-extrabold text-left truncate">${sku}</div><div class="text-gray-400 font-bold">${Math.round(Number(row.col_3||vals[2]||0))}</div><div class="font-black">${Math.round(Number(row.col_4||vals[3]||0))}</div><div class="font-black">${Math.round(Number(row.col_5||vals[4]||0))}</div><div class="flex justify-center">${dot}</div></div>`;
                    });
                } document.getElementById('stat-sku').innerText = skuCount;

                // 2. Traceability dengan Pemisahan Grup Kritis & Aman
                let cCrit=0, cSafe=0;
                let htmlCrit = ""; let htmlSafe = "";
                
                let logData = [];
                if(reqLog.status === 'fulfilled') { let r = await reqLog.value.json(); logData = Array.isArray(r) ? r[0].data || r : r.data; }
                
                if(reqStock.status === 'fulfilled') {
                    let r = await reqStock.value.json(); let d = Array.isArray(r) ? r[0].data || r : r.data;

                    (Array.isArray(d) ? d : [d]).forEach((item, idx) => {
                        const row = item.json || item; 
                        const batchName = row["Nama Batch"] || row.nama_batch || row.col_2; 
                        const expDateStr = row["Tanggal Expired"] || row.tanggal_exp || row.col_3;
                        
                        if(!batchName || String(batchName).toUpperCase() === 'NAMA BATCH') return;
                        
                        let expDate = expDateStr.includes('/') ? new Date(expDateStr.split('/')[2], expDateStr.split('/')[1]-1, expDateStr.split('/')[0]) : new Date(expDateStr);
                        const now = new Date(); 
                        
                        let sisaBulan = 99;
                        if(!isNaN(expDate)) {
                            sisaBulan = (expDate.getFullYear() - now.getFullYear()) * 12;
                            sisaBulan -= now.getMonth();
                            sisaBulan += expDate.getMonth();
                        }
                        
                        let isCritical = sisaBulan <= 3;
                        let cardBg = isCritical ? "bg-[#2A0505]" : "bg-[#051A0A]";
                        let borderCol = isCritical ? "border-appred/40" : "border-appgreen/30";
                        let badgeBorder = isCritical ? "border-appred text-appred" : "border-appgreen text-appgreen";
                        let badgeIcon = isCritical ? "⚠️" : "✅";
                        let warningText = sisaBulan <= 0 ? "EXPIRED / MATI" : `Sisa ${sisaBulan} Bulan`;
                        let locChipBg = isCritical ? "bg-appred shadow-[0_0_8px_rgba(255,59,48,0.4)]" : "bg-appgreen shadow-[0_0_8px_rgba(52,199,89,0.3)]";
                        let dividerCol = isCritical ? "border-appred/20" : "border-appgreen/20";

                        let skusInBatch = [];
                        if(Number(row.NKA || row.nka || 0) > 0) skusInBatch.push("NKA");
                        if(Number(row.NDLH || row.ndlh || 0) > 0) skusInBatch.push("NDLH");
                        if(Number(row.NRD || row.nrd || 0) > 0) skusInBatch.push("NRD");
                        if(Number(row.NARR || row.narr || 0) > 0) skusInBatch.push("NARR");
                        if(Number(row.NKACH || row.nkach || 0) > 0) skusInBatch.push("NKACH");

                        let skuHtml = skusInBatch.length > 0 
                            ? `<div class="flex flex-wrap gap-1.5 mt-1.5">${skusInBatch.map(s => `<span class="bg-white/10 text-white text-[8px] px-2 py-1 rounded font-bold tracking-widest border border-white/10">${s}</span>`).join('')}</div>`
                            : `<span class="text-[8px] text-gray-500 italic mt-1.5 block">Varian tidak tercatat</span>`;

                        let locs = [];
                        logData.forEach(l => { if((l.BATCHES || l.batches || "").includes(batchName) && l.DC && !locs.includes(l.DC)) locs.push(l.DC); });
                        let locH = locs.length ? `<div class="flex flex-wrap gap-1.5 mt-2">${locs.map(dc => `<span class="${locChipBg} text-white text-[8px] px-2 py-1 rounded font-bold tracking-widest">${dc}</span>`).join('')}</div>` : `<span class="text-[8px] text-gray-500 italic mt-2 block">Belum ada sebaran di DC</span>`;

                        let cardHtml = `
                        <div class="${cardBg} p-5 rounded-3xl border ${borderCol} animate-fade" style="animation-delay:${idx*30}ms;opacity:0">
                            <div class="flex justify-between items-start mb-1">
                                <div>
                                    <p class="text-[8px] text-gray-400 font-extrabold uppercase tracking-widest mb-0.5">Nama Batch</p>
                                    <h4 class="font-black text-lg text-white uppercase tracking-wider">${batchName}</h4>
                                </div>
                                <div class="px-3 py-1.5 rounded-lg border ${badgeBorder} text-[10px] font-black uppercase tracking-widest bg-black/50 shadow-sm">
                                    ${badgeIcon} ${warningText}
                                </div>
                            </div>
                            <p class="text-[9px] text-gray-500 font-bold tracking-widest mb-4">Tgl Kadaluarsa: ${expDateStr}</p>
                            
                            <div class="mb-4">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">📦 Varian SKU:</p>
                                ${skuHtml}
                            </div>

                            <div class="border-t ${dividerCol} pt-3">
                                <p class="text-[8px] text-gray-400 font-bold uppercase tracking-widest">📍 LOKASI SEBARAN SAAT INI:</p>
                                ${locH}
                            </div>
                        </div>`;

                        if(isCritical) {
                            htmlCrit += cardHtml; cCrit++;
                        } else {
                            htmlSafe += cardHtml; cSafe++;
                        }
                    });
                    
                    contCrit.innerHTML = htmlCrit || `<div class="p-5 text-center border border-dashed border-appred/30 rounded-2xl bg-appred/5"><p class="text-appred font-bold text-[10px] uppercase tracking-widest">✨ Nol Batch Kritis</p></div>`;
                    contSafe.innerHTML = htmlSafe || `<div class="p-5 text-center border border-dashed border-appgreen/30 rounded-2xl bg-appgreen/5"><p class="text-appgreen font-bold text-[10px] uppercase tracking-widest">Belum Ada Batch Aman</p></div>`;
                }
                document.getElementById('stat-grade-crit').innerText = cCrit; document.getElementById('stat-grade-safe').innerText = cSafe;

                // 3. Diagnose
                dCont.innerHTML = ''; let dcCount = 0;
                if(reqDiag.status === 'fulfilled') {
                    let r = await reqDiag.value.json(); let d = Array.isArray(r) ? r[0].data || r : r.data;
                    (Array.isArray(d) ? d : [d]).forEach((item, idx) => {
                        const row = item.json || item; const dc = row.dc || row.col_2; if(!dc || dc.includes("DIAGNOSE")) return;
                        dcCount++; const res = String(row.res || row.col_9 || "").toUpperCase();
                        let bc = "text-appappleorange"; if(res.includes("FAIL")) bc = "text-appred"; else if(res.includes("ABOVE")||res.includes("SAFE")) bc = "text-appgreen";
                        dCont.innerHTML += `<div class="bg-appcard p-5 rounded-4xl border border-white/7 animate-fade" style="animation-delay:${idx*30}ms;opacity:0"><div class="flex justify-between items-center mb-4"><h4 class="text-sm font-black truncate w-32">${dc}</h4><p class="text-[8px] font-bold ${bc} bg-black px-2 py-1 rounded">⚠️ ${res}</p></div><div class="grid grid-cols-3 text-center bg-black/50 p-3 rounded-2xl"><div class="border-r border-white/10"><p class="text-[7px] text-gray-500 font-bold mb-1">Fail</p><p class="text-xs font-black text-appred">${row.failPct||Math.round((row.col_4||0)*100)}%</p></div><div class="border-r border-white/10"><p class="text-[7px] text-gray-500 font-bold mb-1">Under</p><p class="text-xs font-black text-appappleorange">${row.moqPct||Math.round((row.col_6||0)*100)}%</p></div><div><p class="text-[7px] text-gray-500 font-bold mb-1">Above</p><p class="text-xs font-black text-appgreen">${row.abovePct||Math.round((row.col_8||0)*100)}%</p></div></div></div>`;
                    });
                } document.getElementById('stat-dc').innerText = dcCount;

            } catch(e) { console.error(e); } finally { icn.classList.remove('fa-spin'); }
        }
    </script>
</body>
</html>
