<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC - Portal</title>
    
    <link rel="icon" type="image/png" href="./LOGO FFI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        appbg: '#0A0A0C', 
                        appcard: '#16161A', 
                        appinput: '#222226', 
                        appapplered: '#FF453A', 
                        appappleblue: '#0A84FF', 
                        appappleorange: '#FF9F0A', 
                        appgreen: '#30D158',
                        appborder: '#2C2C30' 
                    },
                    borderRadius: { 
                        '2xl': '1rem',
                        '3xl': '1.25rem', 
                        '4xl': '1.75rem' 
                    },
                    fontFamily: { 
                        'apple': ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Segoe UI"', 'sans-serif'] 
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0C; color: #fff; -webkit-tap-highlight-color: transparent; }
        
        /* Mencegah layar berkedip saat cek login */
        #view-login, #view-lobby { display: none; }
        
        input { background-color: #16161A; border: 1px solid #2C2C30; transition: all 0.2s ease; color: white; width: 100%; border-radius: 1rem; padding: 1rem 1.25rem; outline: none; font-size: 0.95rem; }
        input:focus { border-color: #0A84FF; background-color: #1C1C21; box-shadow: 0 0 0 3px rgba(10,132,255,0.15); }
        .btn-tactile { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.97); opacity: 0.9; }
        #toast { transform: translate(-50%, -150%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .toast-show { transform: translate(-50%, 0) !important; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex justify-center antialiased font-apple min-h-screen bg-appbg text-slate-100">

    <!-- TOAST (Apple-style Notification) -->
    <div id="toast" class="fixed top-6 left-1/2 z-[100] px-6 py-3.5 rounded-2xl font-medium text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none border bg-appcard/80 border-appborder text-white shadow-2xl backdrop-blur-xl transition-all duration-300">
        <span id="toast-icon">✅</span><span id="toast-msg">Success</span>
    </div>

    <!-- MAIN CONTAINER (Minimalist Frame) -->
    <div class="w-full max-w-md md:max-w-xl bg-appbg min-h-screen relative flex flex-col mx-auto md:border-x border-appborder shadow-2xl">
        
        <!-- LAYAR LOGIN -->
        <div id="view-login" class="flex-col flex-1 p-8 justify-center items-center relative z-40">
            <div class="w-full max-w-xs space-y-10">
                <div class="text-center space-y-3">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.style.display='none'" class="w-28 md:w-36 h-auto mx-auto mb-6 opacity-90 filter drop-shadow-[0_4px_12px_rgba(255,255,255,0.05)] animate-fade">
                    <h1 class="text-xl font-bold tracking-tight text-white animate-fade" style="animation-delay: 50ms; opacity:0;">FamilyFood SC</h1>
                    <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-medium animate-fade" style="animation-delay: 100ms; opacity:0;">Secure Access Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4 animate-fade" style="animation-delay: 150ms; opacity:0;">
                    <div class="space-y-3">
                        <input type="text" id="login-user" placeholder="User ID" required class="font-medium bg-appcard">
                        <input type="password" id="login-pass" placeholder="Password" required class="font-medium bg-appcard">
                    </div>
                    <button type="submit" id="btn-login" class="w-full bg-white text-black font-semibold py-3.5 rounded-2xl mt-4 btn-tactile text-sm tracking-wide shadow-lg hover:bg-slate-100 transition-colors">Masuk Sistem</button>
                </form>
            </div>
        </div>

        <!-- LAYAR LOBBY (DASHBOARD MENU) -->
        <div id="view-lobby" class="flex-col min-h-screen bg-appbg relative">
            
            <!-- STICKY HEADER (Frosted Glassmorphism) -->
            <div class="px-6 py-4 md:px-8 border-b border-appborder bg-appbg/70 backdrop-blur-md sticky top-0 z-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.style.display='none'" class="h-7 w-auto object-contain opacity-90">
                    <h2 class="text-base md:text-lg font-bold text-white tracking-tight">Family<span class="text-gray-400 font-normal">Food</span></h2>
                </div>
                <div class="flex items-center gap-2 bg-white/5 border border-white/5 px-3 py-1.5 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-appgreen shadow-[0_0_8px_rgba(48,209,88,0.5)]"></span>
                    <p id="header-username" class="text-[10px] text-gray-300 font-semibold uppercase tracking-wider">USER</p>
                </div>
            </div>

            <!-- MENU GRID -->
            <div class="px-6 py-8 md:px-8 flex-1">
                <p class="text-[11px] font-semibold text-gray-400 uppercase tracking-widest mb-5">Akses Modul Sistem</p>
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- Input Operasional -->
                    <button onclick="goTo('input.html')" class="bg-appcard border border-appborder/60 p-5 md:p-6 rounded-3xl flex flex-col items-start justify-between gap-6 btn-tactile hover:border-appapplered/40 transition-colors group">
                        <div class="w-10 h-10 bg-appapplered/10 rounded-xl flex items-center justify-center text-appapplered group-hover:scale-105 transition-transform">
                            <i class="fa-solid fa-plus text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="text-xs font-semibold text-white tracking-tight block">Input</span>
                            <span class="text-[11px] text-gray-400 block mt-0.5">Operasional</span>
                        </div>
                    </button>
                    
                    <!-- Analytic & QC -->
                    <button onclick="goTo('analytic.html')" class="bg-appcard border border-appborder/60 p-5 md:p-6 rounded-3xl flex flex-col items-start justify-between gap-6 btn-tactile hover:border-appappleblue/40 transition-colors group">
                        <div class="w-10 h-10 bg-appappleblue/10 rounded-xl flex items-center justify-center text-appappleblue group-hover:scale-105 transition-transform">
                            <i class="fa-solid fa-chart-simple text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="text-xs font-semibold text-white tracking-tight block">Analytic</span>
                            <span class="text-[11px] text-gray-400 block mt-0.5">Metrik & QC</span>
                        </div>
                    </button>

                    <!-- Database History -->
                    <button onclick="goTo('data.html')" class="bg-appcard border border-appborder/60 p-5 md:p-6 rounded-3xl flex flex-col items-start justify-between gap-6 btn-tactile hover:border-appgreen/40 transition-colors group">
                        <div class="w-10 h-10 bg-appgreen/10 rounded-xl flex items-center justify-center text-appgreen group-hover:scale-105 transition-transform">
                            <i class="fa-solid fa-database text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="text-xs font-semibold text-white tracking-tight block">Database</span>
                            <span class="text-[11px] text-gray-400 block mt-0.5">Riwayat Sistem</span>
                        </div>
                    </button>

                    <!-- Cetak Laporan -->
                    <button onclick="goTo('report.html')" class="bg-appcard border border-appborder/60 p-5 md:p-6 rounded-3xl flex flex-col items-start justify-between gap-6 btn-tactile hover:border-appappleorange/40 transition-colors group">
                        <div class="w-10 h-10 bg-appappleorange/10 rounded-xl flex items-center justify-center text-appappleorange group-hover:scale-105 transition-transform">
                            <i class="fa-solid fa-file-pdf text-lg"></i>
                        </div>
                        <div class="text-left">
                            <span class="text-xs font-semibold text-white tracking-tight block">Cetak</span>
                            <span class="text-[11px] text-gray-400 block mt-0.5">Laporan PDF</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- LOGOUT AREA -->
            <div class="mt-auto w-full px-6 md:px-8 pb-8 pt-4">
                <button onclick="logout()" class="w-full bg-white/5 border border-appborder text-gray-400 font-medium py-3.5 rounded-2xl btn-tactile hover:bg-appapplered/10 hover:text-appapplered hover:border-appapplered/20 transition-all text-xs tracking-wide">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2 text-[10px]"></i> Keluar Sistem
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('ffi_user');
            if(savedUser) {
                document.getElementById('view-lobby').style.display = 'flex';
                document.getElementById('header-username').innerText = savedUser;
            } else {
                document.getElementById('view-login').style.display = 'flex';
            }
        });

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = msg; 
            document.getElementById('toast-icon').innerText = isError ? '⚠️' : '✅';
            
            t.className = `fixed top-6 left-1/2 z-[100] px-6 py-3.5 rounded-2xl font-medium text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border backdrop-blur-xl shadow-2xl ${isError ? 'bg-[#2C1414]/90 border-appapplered/30 text-appapplered' : 'bg-appcard/90 border-appborder text-white'}`;
            t.classList.add('toast-show'); 
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btn-login'); 
            const user = document.getElementById('login-user').value; 
            const pass = document.getElementById('login-pass').value;
            
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-sm"></i>`;
            btn.classList.add('opacity-70', 'pointer-events-none');
            
            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: "login", user_id: user, password: pass }) 
                });
                
                const textData = await res.text();
                let data;
                try { data = JSON.parse(textData); } catch(err) { data = { status: "error", message: textData }; }
                data = Array.isArray(data) ? data[0] : data;

                if (data && data.status === "success") {
                    localStorage.setItem('ffi_user', data.user_id || user); 
                    document.getElementById('view-login').style.display = 'none'; 
                    document.getElementById('view-lobby').style.display = 'flex'; 
                    document.getElementById('header-username').innerText = data.user_id || user;
                } else {
                    showToast(data ? data.message : "Akses Ditolak", true);
                }
            } catch (err) {
                showToast("Koneksi Server Error", true);
            } finally {
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-70', 'pointer-events-none');
            }
        }

        function logout() { 
            localStorage.removeItem('ffi_user'); 
            location.reload(); 
        }

        function goTo(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
