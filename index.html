<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC - Portal</title>
    
    <link rel="icon" type="image/png" href="./LOGO FFI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        appbg: '#000000',      
                        appcard: '#1C1C1E',    
                        appinput: '#2C2C2E',    
                        appapplered: '#FF3B30',  
                        appappleblue: '#ADD8E6', 
                        appappleorange: '#FF9500', 
                        appgreen: '#34C759',   
                        appred: '#FF3B30'      
                    },
                    borderRadius: { '3xl': '1.5rem', '4xl': '2rem' },
                    fontFamily: { 'apple': ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'], }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Trik agar tidak flash/berkedip saat cek login */
        #view-login, #view-lobby { display: none; }
        
        input { background-color: #2C2C2E; border: 1.5px solid transparent; transition: all 0.25s; color: white; width: 100%; border-radius: 1.25rem; padding: 1.1rem 1.4rem; outline: none; font-weight: 600; font-size: 0.95rem; }
        input:focus { border-color: #FF3B30; background-color: #1C1C1E; box-shadow: 0 0 15px rgba(255,59,48,0.25); }
        
        .btn-tactile { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.96); opacity: 0.92; }
        
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="flex justify-center antialiased font-apple h-screen overflow-hidden">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-appcard border-2 border-appapplered text-white px-7 py-3 rounded-full font-extrabold text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none shadow-[0_0_20px_rgba(255,59,48,0.4)]">
        <span id="toast-icon">✅</span><span id="toast-msg">Success</span>
    </div>

    <div class="w-full max-w-md md:max-w-xl bg-appbg h-full relative flex flex-col shadow-2xl mx-auto md:border-x border-white/5">
        
        <!-- LAYAR LOGIN -->
        <div id="view-login" class="flex-col h-full p-9 justify-center items-center relative z-40">
            <div class="w-full max-w-sm space-y-12">
                <div class="text-center space-y-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.src='https://via.placeholder.com/150/FF3B30/FFFFFF?text=FFI'" class="w-36 md:w-48 h-auto mx-auto mb-8 drop-shadow-[0_0_20px_rgba(255,59,48,0.4)] animate-fade">
                    <p class="text-[11px] md:text-xs text-gray-500 uppercase tracking-[0.35em] font-extrabold animate-fade" style="animation-delay: 100ms; opacity:0;">Secure Access Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-5 animate-fade" style="animation-delay: 200ms; opacity:0;">
                    <input type="text" id="login-user" placeholder="USER ID" required class="text-center font-black uppercase tracking-widest bg-appinput md:py-4">
                    <input type="password" id="login-pass" placeholder="PASSWORD" required class="text-center font-black tracking-widest bg-appinput md:py-4">
                    <button type="submit" id="btn-login" class="w-full bg-appapplered text-white font-extrabold py-4.5 md:py-5 rounded-2xl shadow-[0_0_25px_rgba(255,59,48,0.35)] mt-6 btn-tactile text-sm md:text-base tracking-widest uppercase">MASUK SISTEM</button>
                </form>
            </div>
        </div>

        <!-- LAYAR LOBBY (DASHBOARD MENU) -->
        <div id="view-lobby" class="flex-col h-full bg-[#000000] relative">
            
            <!-- Mengembalikan Header Original FFI -->
            <div class="px-6 py-5 md:px-8 border-b border-white/5 bg-[#000000]/92 backdrop-blur-xl sticky top-0 z-20 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.src='https://via.placeholder.com/50/FF3B30/FFFFFF?text=FFI'" class="h-9 md:h-12 w-auto object-contain drop-shadow-[0_0_10px_rgba(255,59,48,0.25)]">
                    <h2 class="text-lg md:text-2xl font-black text-white tracking-tighter italic leading-none uppercase">Family<span class="text-appappleorange">Food</span></h2>
                </div>
                <div class="flex items-center gap-2 bg-white/10 px-4 py-2 md:px-5 md:py-2.5 rounded-full">
                    <span class="w-2.5 h-2.5 rounded-full bg-appgreen animate-pulse shadow-[0_0_8px_#34C759]"></span>
                    <p id="header-username" class="text-[10px] md:text-xs text-gray-300 uppercase font-extrabold tracking-widest">USER</p>
                </div>
            </div>

            <div class="px-6 py-8 md:px-8">
                <h3 class="text-xs md:text-sm font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Akses Modul Sistem</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <!-- Nav to Input -->
                    <button onclick="goTo('input.html')" class="bg-appcard border border-white/10 p-6 md:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 md:gap-5 btn-tactile shadow-[0_0_15px_rgba(255,59,48,0.1)] hover:border-appapplered transition-colors group">
                        <div class="w-14 h-14 md:w-16 md:h-16 bg-appapplered/10 rounded-full flex items-center justify-center text-appapplered group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-plus text-2xl md:text-3xl"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-extrabold text-white uppercase tracking-widest text-center leading-relaxed">Input<br>Operasional</span>
                    </button>
                    
                    <!-- Nav to Analytic -->
                    <button onclick="goTo('analytic.html')" class="bg-appcard border border-white/10 p-6 md:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 md:gap-5 btn-tactile shadow-[0_0_15px_rgba(173,216,230,0.1)] hover:border-appappleblue transition-colors group">
                        <div class="w-14 h-14 md:w-16 md:h-16 bg-appappleblue/10 rounded-full flex items-center justify-center text-appappleblue group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-chart-simple text-2xl md:text-3xl"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-extrabold text-white uppercase tracking-widest text-center leading-relaxed">Analytic<br>& QC</span>
                    </button>

                    <!-- Nav to Data Log -->
                    <button onclick="goTo('data.html')" class="bg-appcard border border-white/10 p-6 md:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 md:gap-5 btn-tactile shadow-[0_0_15px_rgba(52,199,89,0.1)] hover:border-appgreen transition-colors group">
                        <div class="w-14 h-14 md:w-16 md:h-16 bg-appgreen/10 rounded-full flex items-center justify-center text-appgreen group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-database text-2xl md:text-3xl"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-extrabold text-white uppercase tracking-widest text-center leading-relaxed">Database<br>History</span>
                    </button>

                    <!-- Nav to Report -->
                    <button onclick="goTo('report.html')" class="bg-appcard border border-white/10 p-6 md:p-8 rounded-3xl flex flex-col items-center justify-center gap-4 md:gap-5 btn-tactile shadow-[0_0_15px_rgba(255,149,0,0.1)] hover:border-appappleorange transition-colors group">
                        <div class="w-14 h-14 md:w-16 md:h-16 bg-appappleorange/10 rounded-full flex items-center justify-center text-appappleorange group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-file-pdf text-2xl md:text-3xl"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-extrabold text-white uppercase tracking-widest text-center leading-relaxed">Cetak<br>Laporan</span>
                    </button>
                </div>
            </div>

            <!-- Logout Button -->
            <div class="absolute bottom-10 w-full px-6 md:px-8">
                <button onclick="logout()" class="w-full bg-white/5 border border-white/10 text-gray-400 font-extrabold py-4 md:py-5 rounded-2xl btn-tactile hover:bg-appred/10 hover:text-appred hover:border-appred/30 transition-colors text-[10px] md:text-xs uppercase tracking-widest">
                    <i class="fa-solid fa-arrow-right-from-bracket mr-2"></i> KELUAR SISTEM
                </button>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        // Mencegah Flash Layar Login
        const savedUser = localStorage.getItem('ffi_user');
        if(savedUser) {
            document.getElementById('view-lobby').style.display = 'flex';
            document.getElementById('header-username').innerText = savedUser;
        } else {
            document.getElementById('view-login').style.display = 'flex';
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = msg; 
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-7 py-3 rounded-full font-extrabold text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border-2 shadow-[0_0_20px_rgba(0,0,0,0.5)] ${isError ? 'bg-[#3A0000] border-appred text-appred' : 'bg-appcard border-appgreen text-white shadow-[0_0_20px_rgba(52,199,89,0.3)]'}`;
            t.classList.add('toast-show'); 
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btn-login'); 
            const user = document.getElementById('login-user').value; 
            const pass = document.getElementById('login-pass').value;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: "login", user_id: user, password: pass }) 
                });
                
                // Menyamakan parser login dengan versi HTML monolithic lama agar tidak error
                const textData = await res.text();
                let data;
                try { data = JSON.parse(textData); } catch(err) { data = { status: "error", message: textData }; }
                data = Array.isArray(data) ? data[0] : data;

                if (data && data.status === "success") {
                    localStorage.setItem('ffi_user', data.user_id || user); 
                    document.getElementById('view-login').style.display = 'none'; 
                    document.getElementById('view-lobby').style.display = 'flex'; 
                    document.getElementById('header-username').innerText = data.user_id || user;
                } else {
                    showToast(data ? data.message : "Akses Ditolak", true);
                }
            } catch (err) {
                showToast("Koneksi Server Error", true);
            } finally {
                btn.innerHTML = `MASUK SISTEM`;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function logout() { 
            localStorage.removeItem('ffi_user'); 
            location.reload(); 
        }

        function goTo(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
