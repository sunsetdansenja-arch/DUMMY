<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFood SC - Portal</title>
    
    <link rel="icon" type="image/png" href="./LOGO FFI.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        appbg: '#0D1117', 
                        appcard: '#161B22', 
                        appinput: '#21262D', 
                        appneon: '#A3E635',
                        appapplered: '#FF3B30', 
                        appappleblue: '#ADD8E6', 
                        appappleorange: '#FF9500', 
                        appgreen: '#34C759', 
                        appred: '#FF3B30' 
                    },
                    borderRadius: { '3xl': '1.75rem', '4xl': '2.5rem' },
                    fontFamily: { 'apple': ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0D1117; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        #view-login, #view-lobby { display: none; }
        
        input { background-color: #161B22; border: 1.5px solid rgba(255,255,255,0.05); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); color: white; width: 100%; border-radius: 9999px; padding: 1.1rem 1.6rem; outline: none; font-weight: 600; font-size: 0.95rem; text-align: center; }
        input:focus { border-color: #A3E635; background-color: #21262D; box-shadow: 0 0 20px rgba(163,230,53,0.15); }
        .btn-tactile { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-tactile:active { transform: scale(0.98); opacity: 0.92; }
        #toast { transform: translateY(-150%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .toast-show { transform: translateY(0) !important; }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="flex justify-center antialiased font-apple min-h-screen bg-[#0D1117]">

    <!-- ALERT TOAST -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-7 py-3 rounded-full font-extrabold text-sm flex items-center gap-3 w-max max-w-[90%] pointer-events-none transition-transform duration-300 border bg-appcard border-appgreen text-white shadow-[0_0_20px_rgba(52,199,89,0.2)]">
        <span id="toast-icon">✅</span><span id="toast-msg">Success</span>
    </div>

    <!-- MAIN ENGINE WRAPPER (Diperluas menjadi max-w-5xl untuk kenyamanan view Desktop) -->
    <div class="w-full max-w-md md:max-w-5xl bg-appbg min-h-screen relative flex flex-col shadow-2xl mx-auto md:border-x border-white/5">
        
        <!-- ================= LAYAR LOGIN ================= -->
        <div id="view-login" class="flex-col flex-1 p-8 justify-center items-center relative z-40">
            <div class="w-full max-w-sm space-y-12">
                <div class="text-center space-y-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.style.display='none'" class="w-36 md:w-44 h-auto mx-auto mb-8 drop-shadow-[0_0_25px_rgba(163,230,53,0.15)] animate-fade">
                    <p class="text-[10px] text-gray-400 uppercase tracking-[0.4em] font-black animate-fade" style="animation-delay: 100ms; opacity:0;">Secure Access Center</p>
                </div>
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4 animate-fade" style="animation-delay: 200ms; opacity:0;">
                    <input type="text" id="login-user" placeholder="USER ID" required class="font-black uppercase tracking-widest md:py-4">
                    <input type="password" id="login-pass" placeholder="PASSWORD" required class="font-black tracking-widest md:py-4">
                    <button type="submit" id="btn-login" class="w-full bg-white text-black hover:bg-appneon transition-colors duration-300 font-black py-4.5 md:py-5 rounded-full shadow-[0_4px_20px_rgba(255,255,255,0.1)] mt-6 btn-tactile text-xs md:text-sm tracking-widest uppercase">MASUK SISTEM</button>
                </form>
            </div>
        </div>

        <!-- ================= LAYAR LOBBY (VARY & ENHANCE LEVEL 2: DESKTOP OPTIMIZED BENTO WRAPPER) ================= -->
        <div id="view-lobby" class="flex-col min-h-screen bg-appbg relative">
            
            <!-- PREMIUM STICKY NAVBAR -->
            <div class="px-6 py-5 md:px-8 border-b border-white/5 bg-appbg/90 backdrop-blur-xl sticky top-0 z-20 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <img src="./LOGO FFI.png" alt="Family Food Logo" onerror="this.style.display='none'" class="h-9 md:h-10 w-auto object-contain">
                    <h2 class="text-lg md:text-xl font-black text-white tracking-tighter leading-none uppercase">Family<span class="text-appneon">Food</span></h2>
                </div>
                <div class="flex items-center gap-2.5 bg-white/5 border border-white/10 px-4 py-2 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-appneon animate-pulse shadow-[0_0_8px_#A3E635]"></span>
                    <p id="header-username" class="text-[10px] text-gray-300 uppercase font-black tracking-widest">USER</p>
                </div>
            </div>

            <!-- CORE CONTAINER FOR DASHBOARD -->
            <div class="px-6 py-8 md:px-8 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-6 px-1">
                    <h3 class="text-[10px] md:text-xs font-black text-gray-400 uppercase tracking-[0.25em]">Akses Modul Sistem</h3>
                    <span class="text-[9px] font-bold text-appneon uppercase tracking-wider bg-appneon/10 px-2.5 py-1 rounded-full border border-appneon/20">Active Session</span>
                </div>
                
                <!-- 12-COLUMN ASYMMETRIC BENTO GRID (Sangat presisi di desktop maupun layar besar tablet) -->
                <div class="grid grid-cols-2 md:grid-cols-12 gap-4">
                    
                    <!-- Box 1: Input Operasional (Desktop: Memakan 8 Column / Kiri Atas) -->
                    <button onclick="goTo('input.html')" class="col-span-2 md:col-span-8 bg-appcard border border-white/5 p-6 rounded-3xl flex items-center justify-between btn-tactile hover:border-appneon/30 transition-all group relative overflow-hidden h-36 text-left">
                        <div class="space-y-2 relative z-10">
                            <span class="text-xs md:text-sm font-black text-white uppercase tracking-wider block">Input Operasional</span>
                            <span class="text-[10px] md:text-xs text-gray-400 font-medium block max-w-md normal-case leading-tight">Pencatatan data logistik, sirkulasi stok, dan suplai harian produksi outlet otomatis.</span>
                        </div>
                        <div class="w-12 h-12 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-white group-hover:bg-appneon group-hover:text-black transition-all duration-300 shrink-0 ml-4">
                            <i class="fa-solid fa-plus text-base"></i>
                        </div>
                    </button>
                    
                    <!-- Box 2: Analytic & QC (Desktop: Memakan 4 Column / Kanan Atas) -->
                    <button onclick="goTo('analytic.html')" class="col-span-1 md:col-span-4 bg-appcard border border-white/5 p-6 rounded-3xl flex flex-col items-start justify-between btn-tactile hover:border-appneon/30 transition-all group h-36 text-left">
                        <div class="w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-white group-hover:bg-appneon group-hover:text-black transition-all duration-300">
                            <i class="fa-solid fa-chart-simple text-sm"></i>
                        </div>
                        <div class="space-y-1">
                            <span class="text-[11px] md:text-xs font-black text-white uppercase tracking-wider block">Analytic & QC</span>
                            <span class="text-[9px] md:text-[10px] text-gray-400 font-medium block normal-case leading-tight">Monitoring kualitas pasokan secara berkala.</span>
                        </div>
                    </button>

                    <!-- Box 3: Database History (Desktop: Memakan 4 Column / Kiri Bawah) -->
                    <button onclick="goTo('data.html')" class="col-span-1 md:col-span-4 bg-appcard border border-white/5 p-6 rounded-3xl flex flex-col items-start justify-between btn-tactile hover:border-appneon/30 transition-all group h-36 text-left">
                        <div class="w-10 h-10 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-white group-hover:bg-appneon group-hover:text-black transition-all duration-300">
                            <i class="fa-solid fa-database text-sm"></i>
                        </div>
                        <div class="space-y-1">
                            <span class="text-[11px] md:text-xs font-black text-white uppercase tracking-wider block">Database History</span>
                            <span class="text-[9px] md:text-[10px] text-gray-400 font-medium block normal-case leading-tight">Eksplorasi riwayat logs arsip data.</span>
                        </div>
                    </button>

                    <!-- Box 4: Cetak Laporan (Desktop: Memakan 8 Column / Kanan Bawah) -->
                    <button onclick="goTo('report.html')" class="col-span-2 md:col-span-8 bg-appcard border border-white/5 p-6 rounded-3xl flex items-center justify-between btn-tactile hover:border-appneon/30 transition-all group h-36 text-left">
                        <div class="flex items-center gap-5">
                            <div class="w-12 h-12 bg-white/5 border border-white/10 rounded-full flex items-center justify-center text-white group-hover:bg-appneon group-hover:text-black transition-all duration-300 shrink-0">
                                <i class="fa-solid fa-file-pdf text-base"></i>
                            </div>
                            <div>
                                <span class="text-xs md:text-sm font-black text-white uppercase tracking-wider block mb-1">Cetak Laporan</span>
                                <span class="text-[10px] md:text-xs text-gray-400 font-medium block normal-case leading-tight max-w-sm">Generasi berkas rekapitulasi performa manajemen logistik seluruh outlet regional.</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-600 text-sm group-hover:text-appneon transition-colors mr-2"></i>
                    </button>
                    
                </div>
            </div>

            <!-- ADMINISTRATIVE FOOTER CONTROLS -->
            <div class="mt-auto w-full px-6 md:px-8 pb-8 pt-4">
                <button onclick="logout()" class="w-full bg-white/5 border border-white/5 text-gray-400 hover:text-appred hover:bg-appred/10 hover:border-appred/20 font-black py-4 rounded-xl btn-tactile transition-all duration-300 text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> KELUAR SISTEM
                </button>
            </div>
        </div>
    </div>

    <!-- CORE JAVASCRIPT LOGIC STORAGE & WEBHOOK HANDLER -->
    <script>
        const WEBHOOK_URL = "https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/ff-indonesia-api";

        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('ffi_user');
            if(savedUser) {
                document.getElementById('view-lobby').style.display = 'flex';
                document.getElementById('header-username').innerText = savedUser;
            } else {
                document.getElementById('view-login').style.display = 'flex';
            }
        });

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast'); 
            document.getElementById('toast-msg').innerText = msg; 
            document.getElementById('toast-icon').innerText = isError ? '❌' : '✅';
            
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-7 py-3 rounded-full font-extrabold text-sm flex items-center gap-3 w-max max-w-[90%] transition-transform duration-300 border shadow-[0_0_20px_rgba(0,0,0,0.5)] ${isError ? 'bg-[#3A0000] border-appred text-appred' : 'bg-appcard border-appgreen text-white shadow-[0_0_20px_rgba(52,199,89,0.2)]'}`;
            t.classList.add('toast-show'); 
            setTimeout(() => t.classList.remove('toast-show'), 3000);
        }

        async function handleLogin(e) {
            e.preventDefault(); 
            const btn = document.getElementById('btn-login'); 
            const user = document.getElementById('login-user').value; 
            const pass = document.getElementById('login-pass').value;
            
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            try {
                const res = await fetch(WEBHOOK_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ action: "login", user_id: user, password: pass }) 
                });
                
                const textData = await res.text();
                let data;
                try { data = JSON.parse(textData); } catch(err) { data = { status: "error", message: textData }; }
                data = Array.isArray(data) ? data[0] : data;

                if (data && data.status === "success") {
                    localStorage.setItem('ffi_user', data.user_id || user); 
                    document.getElementById('view-login').style.display = 'none'; 
                    document.getElementById('view-lobby').style.display = 'flex'; 
                    document.getElementById('header-username').innerText = data.user_id || user;
                } else {
                    showToast(data ? data.message : "Akses Ditolak", true);
                }
            } catch (err) {
                showToast("Koneksi Server Error", true);
            } finally {
                btn.innerHTML = `MASUK SISTEM`;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function logout() { 
            localStorage.removeItem('ffi_user'); 
            location.reload(); 
        }

        function goTo(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
